<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAGE_X MVP SHOWDOWN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card-wrapper">
    <div style="padding: 20px;">
        <h2 style="margin:0; font-size:1.4rem;">PAGE_X MVP SHOWDOWN</h2>
        <p style="color:#86868b; margin:5px 0 0;">Make Your Bias the King [cite: 12]</p>
    </div>

    <div class="main-stage" onclick="openLightbox(0)">
        <img src="images/card-1.jpg" alt="Cover">
    </div>

    <div style="padding: 15px; text-align: center; color: #86868b; font-size: 0.9rem;">
        Click to view details
    </div>
</div>

<div class="lightbox" id="lightbox">
    <div class="lightbox-content">
        <span class="close-btn" onclick="closeLightbox()">✕ Back to Main</span>
        
        <button class="nav-btn prev" onclick="changeImage(-1)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>

        <img id="lightbox-img" src="" alt="Detail View">

        <button class="nav-btn next" onclick="changeImage(1)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
    </div>
</div>

<script>
    // 逻辑：点击后仅在 card-2 和 card-3 之间切换
    const subImages = [
        'images/card-2.jpg', // 索引 0 
        'images/card-3.jpg'  // 索引 1 
    ];
    
    let currentIndex = 0;

    function openLightbox(index) {
        currentIndex = 0; // 默认点开展示 card-2
        updateLightbox();
        const lb = document.getElementById('lightbox');
        lb.style.display = 'flex';
        setTimeout(() => lb.classList.add('active'), 10);
    }

    function closeLightbox() {
        const lb = document.getElementById('lightbox');
        lb.classList.remove('active');
        setTimeout(() => lb.style.display = 'none', 400);
    }

    function changeImage(step) {
        // 在 card-2 和 card-3 之间循环
        currentIndex = (currentIndex + step + subImages.length) % subImages.length;
        
        // 添加简单的淡入淡出动画过渡图片
        const img = document.getElementById('lightbox-img');
        img.style.opacity = '0';
        setTimeout(() => {
            updateLightbox();
            img.style.opacity = '1';
        }, 200);
    }

    function updateLightbox() {
        document.getElementById('lightbox-img').src = subImages[currentIndex];
    }

    // 点击暗部区域返回
    document.getElementById('lightbox').onclick = function(e) {
        if (e.target.id === 'lightbox') closeLightbox();
    }
</script>

</body>
</html>
